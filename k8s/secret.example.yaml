apiVersion: v1
kind: Secret
metadata:
    name: super-agent-console-secret
    namespace: default
type: Opaque
stringData:
    DATABASE_URL: 'mysql://prod-user:prod-password@prod-host:3306/super_agent_console'
    MODEL_API_KEY: 'replace-with-real-model-api-key'
    ACCESS_CODES: 'replace-with-access-code-a,replace-with-access-code-b'
    ADMIN_ACCESS_CODES: 'replace-with-owner-admin-code'
    AUTH_COOKIE_SECRET: 'replace-with-random-long-string'
    DEMO_SERVER_TOKEN: 'replace-with-real-demo-server-token'
